<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 할 일 목록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>나의 할 일 목록</h1>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
      <button id="addBtn">추가</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">진행중</button>
      <button class="filter-btn" data-filter="completed">완료</button>
      <button id="clearCompleted">완료된 항목 삭제</button>
    </div>
    <div class="todo-count" id="todoCount"></div>
    <ul class="todo-list" id="todoList"></ul>
  </div>
  <script src="main.js"></script>
</body>
</html>
